AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda with S3 trigger

Resources:

  PdfInputBucket:
    Type: AWS::S3::Bucket
    DependsOn: UploadToSearchPermission
    Properties:
      BucketName: pdf-input-bkt
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:Put
            Function: !GetAtt uploadtosearch.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: output/
                  - Name: suffix
                    Value: .txt

  uploadtosearch:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fnc_uploadtosearch
      Handler: lambda_function.handler
      Runtime: python3.12
      CodeUri: .
      MemorySize: 512
      Timeout: 900
      Role: arn:aws:iam::544471418261:role/opensearch-lambda-role

      Layers:
        - arn:aws:lambda:us-east-2:544471418261:layer:requests-layer:2

  UploadToSearchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref uploadtosearch
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt PdfInputBucket.Arn
      